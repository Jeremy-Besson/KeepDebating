name: FrontEnd CI

on:
  push:
    paths:
      - "FrontEnd/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "FrontEnd/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FrontEnd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
