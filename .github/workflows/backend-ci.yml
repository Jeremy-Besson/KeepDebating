name: BackEnd CI

on:
  push:
    paths:
      - "BackEnd/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "BackEnd/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BackEnd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BackEnd.csproj

      - name: Build (Analyzers + No Warnings)
        run: dotnet build BackEnd.csproj -c Release --no-incremental -warnaserror -v minimal
